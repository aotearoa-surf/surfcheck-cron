name: Forecast fetch (3-hourly)

# Runs the main Stormglass + Open-Meteo forecast cycle and refreshes spot_now.
# Triggered every 3 hours by an EXTERNAL scheduler (cron-job.org) that POSTs to
# this workflow's dispatch API — GitHub's own `schedule:` trigger proved
# unreliable on a new repo, so we drive it externally instead.
on:
  workflow_dispatch: {}         # the external scheduler + the manual "Run workflow" button both use this

concurrency:
  group: fetch-main             # never let two main runs overlap
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25         # safety cap; a healthy run is ~5 min, slow-API spell a bit more
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run main forecast fetch
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STORMGLASS_KEY:       ${{ secrets.STORMGLASS_KEY }}
          OPEN_METEO_KEY:       ${{ secrets.OPEN_METEO_KEY }}
        run: python -u _fetch_main.py
      - name: Email new community submissions
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -u _notify_submissions.py
