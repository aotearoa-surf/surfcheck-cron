name: Forecast fetch (3-hourly)

# Runs the main Stormglass + Open-Meteo forecast cycle and refreshes spot_now.
# Triggered every 3 hours by an EXTERNAL scheduler (cron-job.org) that POSTs to
# this workflow's dispatch API — GitHub's own `schedule:` trigger proved
# unreliable on a new repo, so we drive it externally instead.
on:
  workflow_dispatch: {}         # the external scheduler + the manual "Run workflow" button both use this

concurrency:
  group: fetch-main             # never let two main runs overlap
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25         # safety cap; a healthy run is ~5 min, slow-API spell a bit more
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run main forecast fetch
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STORMGLASS_KEY:       ${{ secrets.STORMGLASS_KEY }}
          OPEN_METEO_KEY:       ${{ secrets.OPEN_METEO_KEY }}
        run: python -u _fetch_main.py
      - name: Purge Cloudflare cache (serve the fresh forecast immediately)
        # Runs only if the fetch succeeded, so we never purge to an empty/failed
        # state. The /sb read-through cache otherwise keeps serving the previous
        # cycle until it ages out, which can lag hours behind this 3-hourly write.
        if: success()
        continue-on-error: true
        run: |
          echo "Purging Cloudflare cache after forecast write..."
          resp=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/7c9c444a4050806c7ef37f2697628193/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | python -c "import sys,json; r=json.load(sys.stdin); print('Cloudflare purge OK' if r.get('success') else 'Cloudflare purge FAILED'); sys.exit(0 if r.get('success') else 1)"
      - name: Email new community submissions
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_PASSWORD:        ${{ secrets.SMTP_PASSWORD }}
        run: python -u _notify_submissions.py
