name: Tide fetch (daily)

# Refreshes only the tide columns on existing slot_forecast rows (NIWA).
# Triggered once a day by the same external scheduler (cron-job.org) via the
# workflow dispatch API.
on:
  workflow_dispatch: {}

concurrency:
  group: fetch-tides
  cancel-in-progress: false

jobs:
  tides:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run tide fetch
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NIWA_KEY:             ${{ secrets.NIWA_KEY }}
        run: python -u _fetch_tides.py
